<!DOCTYPE html>

<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title>Reading Quiz Generator</title>
        <meta name="description" content="">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="/styles/style.css?v=0">
    </head>
    <body>
        <h1>Reading Quiz Generator!!!!!!!</h1>
        <p>
            Generate reading quizzes here.
        </p>
        <form method="post" enctype="multipart/form-data">
            <div>
                <label for="text_upload">Upload a file below.</label>
                <input
                    type="file" 
                    id="text_upload"
                    name="text_upload"
                />
            </div>
        </form>
        <script src="" async defer></script>
    </body>
    
    	<div class="question-container">
            <div class="question">
                <h2>Question 1</h2>
                <p>Which of the following fits in the blank?<br>This ___ example question.</p>
                <input type="radio" id="q1-a" name="q1" value="a">A. is a</input>
                <br>
                <input type="radio" id="q1-b" name="q1" value="b">B. are a</input>
                <br>
                <input type="radio" id="q1-c" name="q1" value="c">C. is an</input>
                <br>
                <input type="radio" id="q1-d" name="q1" value="d">D. are an</input>
                <p></p>
            </div>
            <div class="question">
                <h2>Question 2</h2>
                <p>What does the word 'present' mean?</p>
                <input type="radio" id="q2-a" name="q2" value="a">A. now</input>
                <br>
                <input type="radio" id="q2-b" name="q2" value="b">B. here</input>
                <br>
                <input type="radio" id="q2-c" name="q2" value="c">C. gift</input>
                <br>
                <input type="radio" id="q2-d" name="q2" value="d">D. show</input>
                <p></p>
            </div>
        </div>
        <button id="quiz-check">Check Answer</button>
        <p id="quiz-result"></p>
    <!-- This can (and should) be split off into a separate js file -->
    <!-- But that's a future me problem -->
    <script>
    	const questionCount = 2
        const correctAnswers = ["c","abcd"]
    	var quizCheck = document.getElementById("quiz-check")
        var quizResult = document.getElementById("quiz-result")
        quizCheck.onclick = function(e) {
        	var score = 0
        	for (var q = 0; q < questionCount; q++) {
                var option = document.querySelector("input[name='q" + (q+1) + "']:checked")
                if (option) {
                    if (correctAnswers[q].includes(option.value)) {
                        score += 1
                    }
                }
                quizResult.textContent = "You got " + score + "/" + questionCount + " questions correct."
            }
        }
    </script>

</html>
