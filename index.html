<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title>Reading Quiz Generator</title>
        <meta name="description" content="">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="/styles/style.css?v=0">
    </head>
    <body>
        <h1>Reading Quiz Generator!!!!!!!</h1>
        <p>
            Generate reading quizzes here.
        </p>
        <form method="post" enctype="multipart/form-data">
            <div>
                <label for="text_upload">Upload a file below.</label>
                <input
                    type="file" 
                    id="text_upload"
                    name="text_upload"
                />
            </div>
        </form>
        <script src="" async defer></script>

        <p></p>
        <label for="add-text">Question text:</label><br>
        <input id="add-text"></input><p></p>
        <label for="add-option-a">A.</label>
        <input class="add-option" id="add-option-a"></input>
        <label for="add-a-correct">Correct?</label>
        <input type="checkbox" id="add-a-correct"><br>
        <label for="add-option-b">B.</label>
        <input class="add-option" id="add-option-b"></input>
        <label for="add-b-correct">Correct?</label>
        <input type="checkbox" id="add-b-correct"><br>
        <label for="add-option-c">C.</label>
        <input class="add-option" id="add-option-c"></input>
        <label for="add-c-correct">Correct?</label>
        <input type="checkbox" id="add-c-correct"><br>
        <label for="add-option-d">D.</label>
        <input class="add-option" id="add-option-d"></input>
        <label for="add-d-correct">Correct?</label>
        <input type="checkbox" id="add-d-correct"><br>
        <p></p>
        <button id="add-question">Add Question</button>
        <p id="add-status"></p>
    	<div id="question-container" class="question-container"></div>
        <p></p>
        <button id="quiz-check">Check Answers</button>
        <p id="quiz-result"></p>
    </body>

    <!-- TODO: split this into its own js file -->
    <!-- TODO: find a better way to implement line breaks, formatting, etc. innerHTML is not secure -->
    <script src="questions.js"></script>

</html>
